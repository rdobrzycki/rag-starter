name: Bug report
description: Report a reproducible problem in the project
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Do not use this form for security vulnerabilities. Use the private reporting flow described in `SECURITY.md`.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
      placeholder: A concise description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest set of steps that reproduces the problem
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste stack traces, command output, screenshots, or request/response details if relevant
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and any other relevant local tooling details
      placeholder: macOS 15, Python 3.11, Docker 27, uv 0.x
    validations:
      required: true

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Sync workspace
        working-directory: src
        run: uv sync --all-packages --all-extras --frozen

      - name: Format check
        run: task fmt:check

      - name: Lint
        run: task lint

      - name: Unit tests
        run: task test:unit

      - name: Shared package checks
        run: task ci:shared

  api-integration:
    name: API Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Sync workspace
        working-directory: src
        run: uv sync --all-packages --all-extras --frozen

      - name: Create .env file
        run: cp .env.example .env

      - name: Start local API stack
        run: task local:api:up

      - name: Wait for API health
        run: task local:api:health

      - name: Run API integration tests
        run: task local:test:integration:api

      - name: Stop local API stack
        if: always()
        run: task local:api:down

  ingestion-integration:
    name: Ingestion Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Sync workspace
        working-directory: src
        run: uv sync --all-packages --all-extras --frozen

      - name: Create .env file
        run: cp .env.example .env

      - name: Run ingestion integration tests
        run: task local:test:integration:ingestion

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"

  - package-ecosystem: uv
    directory: /src
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"

  - package-ecosystem: docker
    directory: /src/api
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"

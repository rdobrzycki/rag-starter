[tool.uv.workspace]
members = [
    "api",
    "ingestion",
    "shared"
]

[workspace]
dependencies = [
    "boto3>=1.34",
    "qdrant-client>=1.9",
    "python-json-logger>=2.0",
]

[tool.ruff]
line-length = 100

[tool.pytest.ini_options]
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s - %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
